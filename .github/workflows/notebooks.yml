name: notebooks

# Execute every notebook end-to-end and fail on any cell error,
# so committed notebooks never go stale or broken.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Execute all notebooks (nbmake)
        run: uv run pytest
